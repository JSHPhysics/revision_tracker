<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Physics Revision Tracker – Edexcel (9-1) Separate Science</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--s1:#1a1f2e;--s2:#141925;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);
  --tx:#e2e8f0;--mu:#94a3b8;--hi:#4b5563;
  --r:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --c1:#3b82f6;--c2:#f59e0b;--c3:#10b981;
}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh}
.hdr{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(15,17,23,0.95);backdrop-filter:blur(8px);z-index:200}
.hdr h1{font-size:15px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--mu);margin-top:1px}
.nav{padding:10px 16px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--bd);background:var(--s2);scrollbar-width:thin;scrollbar-color:var(--hi) transparent}
.nav::-webkit-scrollbar{height:3px}.nav::-webkit-scrollbar-thumb{background:var(--hi);border-radius:3px}
.nb{padding:5px 11px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--mu);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:var(--font)}
.nb:hover{background:var(--s1);color:var(--tx);border-color:var(--bd2)}
.nb.active{color:#fff;border-color:var(--tc,var(--c1));background:color-mix(in srgb,var(--tc,var(--c1)) 18%,transparent)}
.main{padding:20px;max-width:1080px;margin:0 auto}
/* Dashboard */
.dsb-top{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px 20px;margin-bottom:18px}
.dsb-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--mu)}
.dsb-stats{display:flex;gap:20px;flex-wrap:wrap}
.dstat{flex:1;min-width:110px}
.dstat-lbl{font-size:10px;color:var(--hi);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.dstat-val{font-size:24px;font-weight:700;line-height:1}
.dstat-sub{font-size:11px;color:var(--mu);margin-top:2px}
.dsb-legend{display:flex;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bd)}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mu)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
/* Topic card */
.tc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--tc,#3b82f6)}
.tc:hover{border-color:var(--bd2);transform:translateY(-1px)}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tc-badge{font-size:10px;font-weight:700;color:var(--tc,#3b82f6);background:color-mix(in srgb,var(--tc,#3b82f6) 14%,transparent);padding:2px 6px;border-radius:4px}
.tc-paper{font-size:10px;color:var(--hi);background:rgba(255,255,255,0.05);padding:2px 5px;border-radius:4px}
.tc-name{font-size:13px;font-weight:600;margin-bottom:3px}
.tc-cnt{font-size:11px;color:var(--mu)}
.prows{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.prow{display:flex;align-items:center;gap:7px}
.plbl{font-size:10px;color:var(--hi);width:40px;flex-shrink:0}
.ptrack{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width 0.5s ease}
.ppct{font-size:10px;color:var(--mu);width:26px;text-align:right;flex-shrink:0}
/* Topic view */
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu);background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.back-btn:hover{background:var(--s1);color:var(--tx)}
.tv-hdr{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px 20px;margin-bottom:14px;border-left:3px solid var(--tc,#3b82f6)}
.tv-title{font-size:17px;font-weight:700;margin-bottom:10px}
.tv-stats{display:flex;gap:16px;flex-wrap:wrap}
.tvs{display:flex;align-items:center;gap:7px}
.tvs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tvs-text{font-size:12px;color:var(--mu)}
.tvs-val{font-size:13px;font-weight:600;color:var(--tx);margin-left:2px}
/* Subtopic */
.sub{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sub-hdr{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background 0.1s}
.sub-hdr:hover{background:rgba(255,255,255,0.02)}
.sub-left{display:flex;align-items:center;gap:0}
.sub-id{font-size:11px;font-weight:600;color:var(--tc,#3b82f6);margin-right:8px;min-width:36px}
.sub-name{font-size:12.5px;font-weight:600}
.sub-right{display:flex;align-items:center;gap:8px}
.mini-pips{display:flex;gap:3px}
.pip{width:6px;height:6px;border-radius:50%;opacity:0.2}
.pip.on{opacity:1}
.chev{font-size:11px;color:var(--hi);transition:transform 0.2s;line-height:1}
.chev.open{transform:rotate(180deg)}
/* Outcome table */
.col-hdr{display:grid;grid-template-columns:1fr 32px 32px 32px;padding:6px 14px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,0.02)}
.ch{font-size:10px;color:var(--hi);text-align:center}
.or{display:grid;grid-template-columns:1fr 32px 32px 32px;padding:7px 14px;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;transition:background 0.1s}
.or:last-child{border-bottom:none}
.or:hover{background:rgba(255,255,255,0.02)}
.ot{font-size:12.5px;color:var(--tx);padding-right:10px;line-height:1.45}
.hb{display:inline-flex;align-items:center;font-size:9px;font-weight:700;color:#f97316;background:rgba(249,115,22,0.13);padding:1px 4px;border-radius:3px;margin-left:5px;vertical-align:middle;line-height:1.2}
.cbw{display:flex;justify-content:center;align-items:center}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.04)}
.cb.on{border-color:transparent}
.cb.on svg{display:block}
.cb svg{display:none;width:11px;height:11px}
.cb.r1.on{background:var(--c1)}.cb.r2.on{background:var(--c2)}.cb.r3.on{background:var(--c3)}
.sub-body.hide{display:none}
/* Reset */
.rbtn{font-size:11px;color:var(--hi);background:none;border:1px solid var(--bd);border-radius:5px;padding:4px 8px;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.rbtn:hover{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#ef4444}
.mark-all{font-size:10px;color:var(--hi);background:none;border:1px solid var(--bd);border-radius:4px;padding:3px 7px;cursor:pointer;font-family:var(--font);transition:all 0.15s;margin-left:auto}
.mark-all:hover{background:var(--s2);color:var(--mu)}
@media(max-width:600px){.main{padding:12px}.grid{grid-template-columns:1fr 1fr;gap:8px}.tv-stats{gap:10px}.dsb-stats{gap:14px}}
</style>
</head>

  try {
    const raw = localStorage.getItem('gcse_phys_rev');
    if (raw) progress = JSON.parse(raw);
  } catch(e) { progress = {}; }
}

function saveProgress() {
  try { localStorage.setItem('gcse_phys_rev', JSON.stringify(progress)); } catch(e){}
}

function getVal(oid, field) {
  return !!(progress[oid] && progress[oid][field]);
}

function toggle(oid, field) {
  if (!progress[oid]) progress[oid] = {};
  progress[oid][field] = !progress[oid][field];
  saveProgress();
  updateView();
}

function confirmReset() {
  if (confirm('Reset all revision progress? This cannot be undone.')) {
    progress = {};
    saveProgress();
    updateView();
  }
}

// ── STATS ────────────────────────────────────────────────────────────────────
function topicStats(topic) {
  let total=0, r=0, e=0, m=0;
  for (const s of topic.sub) {
    for (const [oid] of s.o) {
      total++;
      if (getVal(oid,'r')) r++;
      if (getVal(oid,'e')) e++;
      if (getVal(oid,'m')) m++;
    }
  }
  return {total, r, e, m};
}

function allStats() {
  let total=0, r=0, e=0, m=0;
  for (const t of TOPICS) {
    const s = topicStats(t);
    total += s.total; r += s.r; e += s.e; m += s.m;
  }
  return {total, r, e, m};
}

function subStats(sub) {
  let total=0, r=0, e=0, m=0;
  for (const [oid] of sub.o) {
    total++;
    if (getVal(oid,'r')) r++;
    if (getVal(oid,'e')) e++;
    if (getVal(oid,'m')) m++;
  }
  return {total, r, e, m};
}

function pct(n, d) { return d ? Math.round(100*n/d) : 0; }

// ── CHECK SVG ────────────────────────────────────────────────────────────────
function checkSVG() {
  return `<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="1.5,6 5,9.5 10.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function updateView() {
  renderNav();
  if (currentView === 'dashboard') {
    renderDashboard();
  } else {
    const t = TOPICS.find(t => t.id === currentView);
    if (t) renderTopic(t);
  }
}

function renderNav() {
  const nav = document.getElementById('nav');
  let html = `<button class="nb ${currentView==='dashboard'?'active':''}" onclick="switchView('dashboard')" style="--tc:#6366f1">Dashboard</button>`;
  for (let i=0; i<TOPICS.length; i++) {
    const t = TOPICS[i];
    const cl = currentView===t.id ? 'active' : '';
    html += `<button class="nb ${cl}" onclick="switchView('${t.id}')" style="--tc:${COLORS[i]}">${t.id}</button>`;
  }
  nav.innerHTML = html;
}

function switchView(id) {
  currentView = id;
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0,0);
  updateView();
}

function renderDashboard() {
  const s = allStats();
  const main = document.getElementById('main');
  let html = `
  <div class="dsb-top">
    <div class="dsb-title">Overall revision progress — ${TOPICS.length} topics, ${s.total} learning outcomes</div>
    <div class="dsb-stats">
      <div class="dstat">
        <div class="dstat-lbl">Revised</div>
        <div class="dstat-val" style="color:var(--c1)">${pct(s.r,s.total)}%</div>
        <div class="dstat-sub">${s.r} of ${s.total} outcomes</div>
      </div>
      <div class="dstat">
        <div class="dstat-lbl">Exam questions done</div>
        <div class="dstat-val" style="color:var(--c2)">${pct(s.e,s.total)}%</div>
        <div class="dstat-sub">${s.e} of ${s.total} outcomes</div>
      </div>
      <div class="dstat">
        <div class="dstat-lbl">Mistakes reviewed</div>
        <div class="dstat-val" style="color:var(--c3)">${pct(s.m,s.total)}%</div>
        <div class="dstat-sub">${s.m} of ${s.total} outcomes</div>
      </div>
      <div class="dstat">
        <div class="dstat-lbl">Fully complete</div>
        <div class="dstat-val" style="color:#e2e8f0">${countComplete(s.total)}</div>
        <div class="dstat-sub">outcomes (all 3 boxes)</div>
      </div>
    </div>
    <div class="dsb-legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--c1)"></div>Revised content</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c2)"></div>Exam questions completed</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c3)"></div>Mistakes reviewed</div>
    </div>
  </div>
  <div class="grid">`;
  
  for (let i=0; i<TOPICS.length; i++) {
    const t = TOPICS[i];
    const ts = topicStats(t);
    const col = COLORS[i];
    html += `
    <div class="tc" onclick="switchView('${t.id}')" style="--tc:${col}">
      <div class="tc-top">
        <span class="tc-badge">${t.id}</span>
        <span class="tc-paper">Paper ${t.paper}</span>
      </div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-cnt">${ts.total} learning outcomes</div>
      <div class="prows">
        <div class="prow">
          <span class="plbl">Revised</span>
          <div class="ptrack"><div class="pfill" style="width:${pct(ts.r,ts.total)}%;background:var(--c1)"></div></div>
          <span class="ppct">${pct(ts.r,ts.total)}%</span>
        </div>
        <div class="prow">
          <span class="plbl">Exam Qs</span>
          <div class="ptrack"><div class="pfill" style="width:${pct(ts.e,ts.total)}%;background:var(--c2)"></div></div>
          <span class="ppct">${pct(ts.e,ts.total)}%</span>
        </div>
        <div class="prow">
          <span class="plbl">Reviewed</span>
          <div class="ptrack"><div class="pfill" style="width:${pct(ts.m,ts.total)}%;background:var(--c3)"></div></div>
          <span class="ppct">${pct(ts.m,ts.total)}%</span>
        </div>
      </div>
    </div>`;
  }
  html += `</div>`;
  main.innerHTML = html;
}

function countComplete(total) {
  let c = 0;
  for (const t of TOPICS) {
    for (const s of t.sub) {
      for (const [oid] of s.o) {
        if (getVal(oid,'r') && getVal(oid,'e') && getVal(oid,'m')) c++;
      }
    }
  }
  return c;
}

function renderTopic(topic) {
  const ti = TOPICS.indexOf(topic);
  const col = COLORS[ti];
  const ts = topicStats(topic);
  const main = document.getElementById('main');
  
  let html = `
  <div class="back-row">
    <button class="back-btn" onclick="switchView('dashboard')">&#8592; All topics</button>
  </div>
  <div class="tv-hdr" style="--tc:${col}">
    <div class="tv-title">${topic.id} — ${topic.name}</div>
    <div class="tv-stats">
      <div class="tvs">
        <div class="tvs-dot" style="background:var(--c1)"></div>
        <span class="tvs-text">Revised</span>
        <span class="tvs-val">${ts.r}/${ts.total}</span>
        <span class="tvs-text">(${pct(ts.r,ts.total)}%)</span>
      </div>
      <div class="tvs">
        <div class="tvs-dot" style="background:var(--c2)"></div>
        <span class="tvs-text">Exam Qs</span>
        <span class="tvs-val">${ts.e}/${ts.total}</span>
        <span class="tvs-text">(${pct(ts.e,ts.total)}%)</span>
      </div>
      <div class="tvs">
        <div class="tvs-dot" style="background:var(--c3)"></div>
        <span class="tvs-text">Reviewed</span>
        <span class="tvs-val">${ts.m}/${ts.total}</span>
        <span class="tvs-text">(${pct(ts.m,ts.total)}%)</span>
      </div>
    </div>
  </div>`;
  
  for (const sub of topic.sub) {
    const ss = subStats(sub);
    html += `
    <div class="sub" id="${sub.id}_card">
      <div class="sub-hdr" onclick="toggleSub('${sub.id}')">
        <div class="sub-left">
          <span class="sub-id" style="color:${col}">${sub.id}</span>
          <span class="sub-name">${sub.name}</span>
        </div>
        <div class="sub-right">
          <div class="mini-pips">
            <div class="pip ${ss.r>0?'on':''}" style="${ss.r>0?'background:var(--c1)':'background:var(--hi)'}"></div>
            <div class="pip ${ss.e>0?'on':''}" style="${ss.e>0?'background:var(--c2)':'background:var(--hi)'}"></div>
            <div class="pip ${ss.m>0?'on':''}" style="${ss.m>0?'background:var(--c3)':'background:var(--hi)'}"></div>
          </div>
          <span style="font-size:10px;color:var(--hi)">${ss.r+ss.e+ss.m}/${ss.total*3}</span>
          <span class="chev open" id="${sub.id}_chev">&#8964;</span>
        </div>
      </div>
      <div class="sub-body" id="${sub.id}_body">
        <div class="col-hdr">
          <div class="ch" style="text-align:left;color:var(--mu)">Learning outcome</div>
          <div class="ch" style="color:var(--c1)" title="Revised content">Rev</div>
          <div class="ch" style="color:var(--c2)" title="Completed exam questions">Qs</div>
          <div class="ch" style="color:var(--c3)" title="Reviewed mistakes">Err</div>
        </div>`;
    
    for (const [oid, text, isH] of sub.o) {
      const rv = getVal(oid,'r'), ev = getVal(oid,'e'), mv = getVal(oid,'m');
      html += `
        <div class="or">
          <div class="ot">${escHtml(text)}${isH?'<span class="hb">H</span>':''}</div>
          <div class="cbw"><div class="cb r1 ${rv?'on':''}" onclick="toggle('${oid}','r')" title="Mark as revised">${rv?checkSVG():''}</div></div>
          <div class="cbw"><div class="cb r2 ${ev?'on':''}" onclick="toggle('${oid}','e')" title="Mark exam questions done">${ev?checkSVG():''}</div></div>
          <div class="cbw"><div class="cb r3 ${mv?'on':''}" onclick="toggle('${oid}','m')" title="Mark mistakes reviewed">${mv?checkSVG():''}</div></div>
        </div>`;
    }
    html += `</div></div>`;
  }
  
  main.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleSub(id) {
  const body = document.getElementById(id+'_body');
  const chev = document.getElementById(id+'_chev');
  if (body.classList.contains('hide')) {
    body.classList.remove('hide');
    chev.classList.add('open');
  } else {
    body.classList.add('hide');
    chev.classList.remove('open');
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadProgress();
updateView();
</script>
</body>
</html>
